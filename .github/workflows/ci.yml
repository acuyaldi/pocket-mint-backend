name: Backend CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pocketmint_test
  TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pocketmint_test

jobs:
  verify:
    name: Verify backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pocketmint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check migration directory
        shell: bash
        run: |
          set -euo pipefail

          test -f prisma/migrations/migration_lock.toml

          migration_count="$(
            find prisma/migrations \
              -mindepth 1 \
              -maxdepth 1 \
              -type d |
            wc -l
          )"

          if [ "$migration_count" -eq 0 ]; then
            echo "::error::No Prisma migrations found."
            exit 1
          fi

          echo "Found $migration_count migration directories."

      - name: Reject dangerous migration commands
        shell: bash
        run: |
          set -euo pipefail

          if grep -RInE \
            'prisma[[:space:]]+migrate[[:space:]]+(dev|reset)|prisma[[:space:]]+db[[:space:]]+push' \
            package.json \
            scripts \
            src \
            Dockerfile* \
            railway.json \
            railway.toml \
            nixpacks.toml \
            2>/dev/null; then
            echo "::error::Unsafe Prisma command found in runtime or deployment configuration."
            exit 1
          fi

      - name: Ensure production migration is not in app startup
        shell: bash
        run: |
          set -euo pipefail

          if grep -RInE \
            'prisma[[:space:]]+migrate[[:space:]]+deploy' \
            package.json \
            scripts \
            src \
            Dockerfile* \
            railway.json \
            railway.toml \
            nixpacks.toml \
            2>/dev/null; then
            echo "::error::prisma migrate deploy must not run during application startup or build."
            exit 1
          fi

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Apply migrations to disposable test database
        run: npx prisma migrate deploy

      - name: Require integration test database
        shell: bash
        run: |
          if [ -z "${TEST_DATABASE_URL}" ]; then
            echo "::error::TEST_DATABASE_URL is required. Integration tests must not silently skip."
            exit 1
          fi
          echo "Integration test database URL is configured."

      - name: Test
        run: npx vitest run --reporter=default

      - name: Build
        run: npm run build

      - name: Normalize Prisma runtime line endings
        shell: bash
        run: |
          set -euo pipefail

          # @prisma/client ships runtime/client.d.ts and
          # runtime/index-browser.d.ts with CRLF inside the npm package.
          # `prisma generate` copies them byte-for-byte, so they land on disk
          # with CRLF even though the repo stores them as LF. Strip the CR so
          # the working tree matches what's committed.
          sed -i 's/\r$//' \
            src/generated/prisma/runtime/client.d.ts \
            src/generated/prisma/runtime/index-browser.d.ts \
            dist/generated/prisma/runtime/client.d.ts \
            dist/generated/prisma/runtime/index-browser.d.ts

      - name: Check uncommitted changes
        shell: bash
        run: |
          set -euo pipefail

          git diff --check

          if ! git diff --quiet; then
            echo "::error::Build or generation modified tracked files."
            git status --short
            git diff --stat
            exit 1
          fi

          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is not clean after verification."
            git status --short
            exit 1
          fi
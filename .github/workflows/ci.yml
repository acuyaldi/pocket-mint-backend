name: Backend CI

on:
  pull_request:
    branches:
      - dev
      - main

  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Backend Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Disposable database for the Prisma integration suite ONLY — never
    # Supabase or any shared instance. Torn down with the job.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pocketmint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pocketmint_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations to disposable test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Run tests (including Prisma integration suite)
        run: npx vitest run

      - name: Production build
        run: npm run build

      - name: Verify Prisma client packaging
        run: |
          test -f dist/generated/prisma/client.js
          node -e "require('./dist/generated/prisma/client'); console.log('Prisma client packaging OK')"

      - name: Check repository diff
        run: git diff --exit-code
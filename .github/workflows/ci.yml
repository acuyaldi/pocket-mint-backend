name: Backend CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_ENV: test

jobs:
  verify:
    name: Verify backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check migration directory
        shell: bash
        run: |
          set -euo pipefail

          test -f prisma/migrations/migration_lock.toml

          migration_count="$(
            find prisma/migrations \
              -mindepth 1 \
              -maxdepth 1 \
              -type d |
            wc -l
          )"

          if [ "$migration_count" -eq 0 ]; then
            echo "::error::No Prisma migrations found."
            exit 1
          fi

          echo "Found $migration_count migration directories."

      - name: Reject dangerous migration commands
        shell: bash
        run: |
          set -euo pipefail

          if grep -RInE \
            'prisma[[:space:]]+migrate[[:space:]]+(dev|reset)|prisma[[:space:]]+db[[:space:]]+push' \
            package.json \
            scripts \
            src \
            Dockerfile* \
            railway.json \
            railway.toml \
            nixpacks.toml \
            2>/dev/null; then
            echo "::error::Unsafe Prisma command found in runtime or deployment configuration."
            exit 1
          fi

      - name: Ensure production migration is not in app startup
        shell: bash
        run: |
          set -euo pipefail

          if grep -RInE \
            'prisma[[:space:]]+migrate[[:space:]]+deploy' \
            package.json \
            scripts \
            src \
            Dockerfile* \
            railway.json \
            railway.toml \
            nixpacks.toml \
            2>/dev/null; then
            echo "::error::prisma migrate deploy must not run during application startup or build."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run --reporter=default

      - name: Build
        run: npm run build

      - name: Check uncommitted changes
        shell: bash
        run: |
          set -euo pipefail

          git diff --check

          if ! git diff --quiet; then
            echo "::error::Build or generation modified tracked files."
            git status --short
            git diff --stat
            exit 1
          fi

          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is not clean after verification."
            git status --short
            exit 1
          fi